---
name: "Deploy to Dokploy"

on:
  workflow_run:
    workflows: ["Publish Docker Image"]
    types:
      - completed

jobs:
  deploy:
    name: "Trigger Dokploy Webhook"
    runs-on: "ubuntu-latest"
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: "Trigger Dokploy Webhook"
        run: |
          curl -sS -X GET "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
