---
name: "CI"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  PYTHON_VERSION: "3.12"

jobs:
  tests:
    name: "Tests"
    runs-on: "ubuntu-latest"
    services:
      db:
        image: "postgres:15.1"
        ports:
          - "5432:5432"
        env:
          POSTGRES_HOST_AUTH_METHOD: "trust"
        options: "--health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v8.1.0"
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Setup Python ${{ env.PYTHON_VERSION }}"
        uses: "actions/setup-python@v5"
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: "Run tests (via Nox)"
        run: "uv run --frozen --only-group nox -- nox -s tests"

      - name: "Upload coverage data"
        uses: "actions/upload-artifact@v4"
        with:
          name: "coverage-data-${{ env.PYTHON_VERSION }}"
          path: ".coverage.*"
          include-hidden-files: true

  coverage:
    name: "Coverage report"
    runs-on: "ubuntu-latest"
    needs: "tests"

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v8.1.0"
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Setup Python ${{ env.PYTHON_VERSION }}"
        uses: "actions/setup-python@v5"
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - uses: "actions/download-artifact@v4"
        with:
          pattern: "coverage-data-*"
          merge-multiple: "true"

      - name: "Combine coverage (via Nox)"
        run: "uv run --frozen --only-group nox -- nox -s coverage_report"

      - name: "Upload coverage reports to Codecov"
        uses: "codecov/codecov-action@v5"
        with:
          files: "coverage.xml"
        env:
          CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"


  generate-checks:
    name: "Generate checks matrix"
    runs-on: "ubuntu-latest"
    outputs:
      session: ${{ steps.set-matrix.outputs.session }}
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v8.1.0"
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Setup Python ${{ env.PYTHON_VERSION }}"
        uses: "actions/setup-python@v5"
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: "Set matrix"
        id: "set-matrix"
        shell: "bash"
        run: echo "session=$(uv run --frozen --only-group nox -- nox --json -l -t check | jq -c '[.[].session]')" >> "$GITHUB_OUTPUT"

  checks:
    name: "${{ matrix.session }}"
    runs-on: "ubuntu-latest"
    needs: "generate-checks"
    strategy:
      fail-fast: false
      matrix:
        session: ${{ fromJson(needs.generate-checks.outputs.session) }}
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v8.1.0"
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Setup Python ${{ env.PYTHON_VERSION }}"
        uses: "actions/setup-python@v5"
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: "Run '${{ matrix.session }}' Nox session"
        run: "uv run --frozen --only-group nox -- nox -s ${{ matrix.session }}"
